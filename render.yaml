services:
  - type: web
    name: cortex-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: EMBEDDING_BACKEND
        value: jina
      - key: EMBEDDING_MODEL
        value: jina-embeddings-v3
      - key: EMBEDDING_DIMENSIONS
        value: "1024"
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: cortex_kb
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
