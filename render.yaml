services:
  - type: web
    name: cortex-api
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        value: "https://cortex-api.onrender.com"
      - key: FRONTEND_URL
        value: "https://cortex-app.vercel.app"
      # The following must be set securely in the Render Dashboard
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
